name: custom pages demo
intent: >
  自作テストページ（resources/custom_pages）を対象に、ページ間リンク遷移・テキスト入力・
  select・checkbox/uncheck・hover・確認のみのステップ（add_expectationのtoBeVisible/
  toHaveText両方）まで、vertical sliceが持つ操作系tool一式を1シナリオで通しで踏めるかを
  確認する回帰的なウォークスルー。
seed_url: "http://localhost:8080/index.html"
steps:
  - id: 1
    instruction: トップページの「検索ページへ」リンクをクリックして検索ページに遷移する
  - id: 2
    instruction: 検索キーワード欄をクリックしてフォーカスする
  - id: 3
    instruction: 検索キーワード欄に "playwright" と入力する
  - id: 4
    instruction: Enterキーを押して検索を実行する
  - id: 5
    instruction: 検索結果が表示されていることを確認する（画面操作は不要、確認のみ）
  - id: 6
    instruction: 検索ページ上部の「トップへ戻る」リンクをクリックしてトップページに戻る
  - id: 7
    instruction: トップページの「フォームページへ」リンクをクリックしてフォームページに遷移する
  - id: 8
    instruction: お名前欄に "山田太郎" と入力する
  - id: 9
    instruction: 都道府県セレクトから "東京都" を選択する
  - id: 10
    instruction: 「ニュースレターに登録する」チェックボックスをチェックする
  - id: 11
    instruction: 「キャンペーン情報を受け取る」チェックボックスのチェックを外す
  - id: 12
    instruction: ヘルプボタンにマウスホバーしてツールチップを表示する
  - id: 13
    instruction: ツールチップのテキストが表示されていることを確認する（画面操作は不要、確認のみ）
  - id: 14
    instruction: 送信ボタンをクリックする
  - id: 15
    instruction: 送信完了メッセージが表示されていることを確認する（画面操作は不要、確認のみ）
