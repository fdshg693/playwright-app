name: search demo
intent: >
  playwright.dev という外部サイトを対象に、検索欄へのfill→Enter押下→結果確認という
  最小限の操作列でvertical sliceのコアループ（1ステップ＝1フレッシュコンテキストでの
  AI呼び出し）が成立するかを確認する、最初の動作確認シナリオ。
seed_url: "https://playwright.dev"
steps:
  - id: 1
    instruction: 検索欄をクリックしてフォーカスする
  - id: 2
    instruction: 検索欄に "playwright" と入力する
  - id: 3
    instruction: Enterキーを押して検索を実行する
  - id: 4
    instruction: 検索結果が表示されていることを確認する（画面操作は不要、確認のみ）
