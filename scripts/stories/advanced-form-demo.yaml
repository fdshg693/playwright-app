name: advanced form demo
intent: >
  form.htmlに追加したラジオボタン（お問い合わせ種別）とテキストエリア（お問い合わせ内容）という、
  既存storiesでは未使用のフォーム要素種別をvertical sliceに踏ませる。特にテキストエリアへは
  改行を含む複数行文字列を入力し、単一行fillしか通していなかった既存シナリオとの差を確認する。
seed_url: "http://localhost:8080/form.html"
steps:
  - id: 1
    instruction: お問い合わせ種別のラジオボタンから「不具合」を選択する
  - id: 2
    instruction: お問い合わせ内容欄に「画面Aで発生した不具合について報告します。\n再現手順は以下の通りです。\n1. トップページを開く\n2. フォームページに遷移する」を入力する（\nは実際の改行として入力する）
  - id: 3
    instruction: 送信ボタンをクリックする
  - id: 4
    instruction: 送信完了メッセージが表示されていることを確認する（画面操作は不要、確認のみ）
